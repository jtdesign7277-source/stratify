<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stratify Sign-up – Sandbox</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js" crossorigin></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; }
    input::placeholder { color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const LEFT_POINTS = [
      'Live market context and execution in one workspace.',
      'Fast strategy drafting, backtesting, and deployment flows.',
      'Risk-aware tooling with clear session-level controls.',
    ];

    const LEAGUE_LOGOS = [
      { id: 'nba', alt: 'NBA', src: 'https://upload.wikimedia.org/wikipedia/commons/e/e5/NBA_script.svg' },
      { id: 'nhl', alt: 'NHL', src: 'https://upload.wikimedia.org/wikipedia/de/1/19/Logo-NHL.svg' },
      { id: 'mlb', alt: 'MLB', src: 'https://upload.wikimedia.org/wikipedia/commons/a/a6/Major_League_Baseball_logo.svg' },
      { id: 'nfl', alt: 'NFL', src: 'https://upload.wikimedia.org/wikipedia/en/a/a2/National_Football_League_logo.svg' },
    ];

    function LeftPanelCanvas({ containerRef }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        const container = containerRef?.current;
        if (!canvas || !container) return;
        const setSize = () => {
          canvas.width = container.clientWidth;
          canvas.height = container.clientHeight;
        };
        setSize();
        const ro = new ResizeObserver(setSize);
        ro.observe(container);
        const tickers = ['$AAPL +1.2%', '$TSLA -0.8%', '$NVDA +2.4%', '$SPY +0.3%', '$GOOGL +0.5%', '$MSFT -0.2%', '$META +1.1%', '$AMZN +0.7%'];
        let state = tickers.map((text, i) => ({ text, x: Math.random() * (container.clientWidth || 800), y: Math.random() * (container.clientHeight || 600), speed: 0.2 + Math.random() * 0.3 }));
        const start = performance.now();
        let raf;
        const draw = () => {
          const w = canvas.width, h = canvas.height;
          if (!w || !h) { raf = requestAnimationFrame(draw); return; }
          const ctx = canvas.getContext('2d');
          if (!ctx) { raf = requestAnimationFrame(draw); return; }
          ctx.clearRect(0, 0, w, h);
          for (let i = 0; i < h; i += 40) {
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(w, i);
            ctx.stroke();
          }
          const pulse = 0.04 + 0.04 * Math.sin((performance.now() - start) / 4000 * 2 * Math.PI);
          const g = ctx.createRadialGradient(0, h, 0, 0, h, 300);
          g.addColorStop(0, `rgba(16,185,129,${pulse})`);
          g.addColorStop(1, 'rgba(16,185,129,0)');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, w, h);
          ctx.font = '12px monospace';
          ctx.fillStyle = 'rgba(255,255,255,0.28)';
          state.forEach((t) => {
            t.y -= t.speed;
            if (t.y < -20) { t.y = h + 20; t.x = Math.random() * w; }
            ctx.fillText(t.text, t.x, t.y);
          });
          raf = requestAnimationFrame(draw);
        };
        raf = requestAnimationFrame(draw);
        return () => { cancelAnimationFrame(raf); ro.disconnect(); };
      }, [containerRef]);
      return <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', zIndex: 0 }} />;
    }

    function NyseLogo() {
      return (
        <svg viewBox="0 0 62 20" style={{ width: '5rem', height: '1.75rem', opacity: 0.9 }} fill="none" aria-hidden="true">
          <text x="0" y="14" fill="rgba(255,255,255,0.9)" fontFamily="system-ui, Arial, sans-serif" fontWeight="700" fontSize="12" letterSpacing="0.02em">NYSE</text>
          <path fill="#5EB3E0" d="M42 0h2v8h6v2h-8V0z" />
        </svg>
      );
    }

    function Modal({ title, children, isOpen, onClose }) {
      if (!isOpen) return null;
      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 50 }}>
          <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(4px)' }} onClick={onClose} aria-hidden="true" />
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, pointerEvents: 'none' }}>
            <div style={{ maxWidth: 672, width: '100%', maxHeight: '80vh', background: 'linear-gradient(to bottom right, rgba(255,255,255,0.06), rgba(255,255,255,0.02))', backdropFilter: 'blur(16px)', borderRadius: 16, border: '1px solid rgba(255,255,255,0.08)', boxShadow: '0 24px 64px rgba(0,0,0,0.6)', padding: 24, overflow: 'auto', pointerEvents: 'auto' }} onClick={e => e.stopPropagation()}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
                <h2 style={{ margin: 0, color: '#fff', fontWeight: 600, fontSize: 18 }}>{title}</h2>
                <button type="button" onClick={onClose} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.7)', cursor: 'pointer', padding: 4, fontSize: 18 }} aria-label="Close">×</button>
              </div>
              <div style={{ color: 'rgba(255,255,255,0.8)', fontSize: 14, lineHeight: 1.6 }}>{children}</div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const leftRef = useRef(null);
      const [mode, setMode] = useState('signup');
      const [email, setEmail] = useState('');
      const [pw, setPw] = useState('');
      const [cpw, setCpw] = useState('');
      const [redirecting, setRedirecting] = useState(false);
      const [error, setError] = useState(null);
      const [showTerms, setShowTerms] = useState(false);
      const [showPrivacy, setShowPrivacy] = useState(false);

      const baseUrl = typeof window !== 'undefined' && window.location.hostname === 'localhost'
        ? 'http://localhost:5173'
        : (typeof window !== 'undefined' ? window.location.origin : '');
      const authUrl = baseUrl + '/auth';
      const landingUrl = baseUrl + '/';

      const goToRealSignIn = () => {
        setRedirecting(true);
        window.location.href = authUrl;
      };

      const submit = (e) => {
        e.preventDefault();
        if (mode === 'signup' && pw !== cpw) { setError("Passwords don't match"); return; }
        setError(null);
        goToRealSignIn();
      };

      const switchMode = (m) => { setMode(m); setError(null); setCpw(''); };

      const inputStyle = {
        height: 48, width: '100%', borderRadius: 10, border: '1px solid #555', background: '#252525',
        padding: '0 16px', fontSize: 'clamp(0.94rem, 0.98vw, 1.06rem)', color: '#fff', outline: 'none', boxSizing: 'border-box',
      };
      const tabStyle = {
        height: 48, width: '100%', borderRadius: 10, border: '1px solid #555', background: '#252525',
        padding: '0 16px', fontSize: 'clamp(0.94rem, 0.98vw, 1.06rem)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12, cursor: 'pointer', fontWeight: 500, fontFamily: 'inherit',
      };
      const green = '#609968';

      return (
        <div style={{ minHeight: '100vh', background: '#000', color: '#fff' }}>
          <div style={{ padding: '10px 16px', background: 'rgba(255,200,0,0.15)', borderBottom: '1px solid rgba(255,200,0,0.3)', color: 'rgba(255,255,255,0.9)', fontSize: 13, display: 'flex', flexWrap: 'wrap', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
            <span>Preview only — this form does not sign you in.</span>
            <a href={authUrl} style={{ background: '#609968', color: '#fff', padding: '6px 14px', borderRadius: 8, fontWeight: 600, textDecoration: 'none' }}>Take me to sign in on Stratify →</a>
          </div>
          <div className="signup-grid" style={{ minHeight: '100vh' }}>
            <style>{`
              .signup-grid { display: grid; grid-template-columns: 1fr; min-height: 100vh; }
              @media (min-width: 1024px) { .signup-grid { grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr); } }
              .left-panel { display: none !important; border-right: 1px solid rgba(255,255,255,0.1); padding: 4rem 3.5rem; flex-direction: column; justify-content: space-between; position: relative; }
              @media (min-width: 1024px) { .left-panel { display: flex !important; } }
            `}</style>
            <aside ref={leftRef} className="left-panel">
              <LeftPanelCanvas containerRef={leftRef} />
              <div style={{ position: 'relative', zIndex: 10 }}>
                <a href={landingUrl} style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'none', border: 'none', color: 'rgba(255,255,255,0.6)', fontSize: 14, cursor: 'pointer', textDecoration: 'none' }}>← Back</a>
                <div style={{ maxWidth: 620, marginTop: 24 }}>
                  <p style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.32em', color: 'rgba(255,255,255,0.45)' }}>Stratify Platform</p>
                  <div style={{ background: 'linear-gradient(to right, rgba(0,0,0,0.5), rgba(0,0,0,0.3), transparent)', borderRadius: 16, padding: '1rem 1.5rem', marginTop: 8 }}>
                    <h2 style={{ fontSize: 'clamp(2.5rem, 4vw, 4.7rem)', fontWeight: 600, lineHeight: 0.96, margin: 0 }}>One workspace. Every market.</h2>
                    <p style={{ marginTop: 20, fontSize: 'clamp(1rem, 1.2vw, 1.18rem)', lineHeight: 1.6, color: 'rgba(255,255,255,0.65)' }}>
                      Build, test, and deploy smarter execution with live market context and AI-assisted workflows.
                    </p>
                    <div style={{ marginTop: 20 }}>
                      {LEFT_POINTS.map((point, i) => (
                        <div key={i} style={{ fontSize: 'clamp(0.96rem, 1.02vw, 1.08rem)', color: 'rgba(255,255,255,0.8)', marginBottom: 8 }}>{point}</div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
              <div style={{ position: 'relative', zIndex: 10, display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12, alignItems: 'center', maxWidth: 320, marginTop: 'auto', paddingTop: 16 }}>
                {LEAGUE_LOGOS.map((l) => (
                  <img key={l.id} src={l.src} alt={l.alt} style={{ width: 28, height: 28, objectFit: 'contain', opacity: 0.9 }} />
                ))}
                <div style={{ marginLeft: 8 }}>
                  <NyseLogo />
                </div>
              </div>
            </aside>

            {/* Right panel – form */}
            <main style={{ display: 'flex', maxHeight: '100vh', alignItems: 'center', justifyContent: 'center', overflowY: 'auto', padding: '1rem 1.5rem' }}>
              <div style={{ width: '100%', maxWidth: 420 }}>
                <header style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
                  <a href={landingUrl} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.6)', fontSize: 14, cursor: 'pointer', textDecoration: 'none' }}>← Back</a>
                  <span style={{ fontSize: 11, fontWeight: 400, textTransform: 'uppercase', letterSpacing: '0.32em', color: 'rgba(255,255,255,0.75)' }}>STRATIFY</span>
                </header>
                <section style={{ marginBottom: 24 }}>
                  <h1 style={{ fontSize: 'clamp(1.75rem, 2.4vw, 2.5rem)', fontWeight: 600, margin: 0 }}>{mode === 'signup' ? 'Create your account' : 'Welcome back'}</h1>
                  <p style={{ marginTop: 4, fontSize: 'clamp(0.9rem, 0.96vw, 1rem)', color: 'rgba(255,255,255,0.55)' }}>
                    {mode === 'signup' ? 'Create your account to get started.' : 'Sign in to your account'}
                  </p>
                </section>
                <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <div>
                    <label style={{ display: 'block', marginBottom: 8, fontSize: 14, fontWeight: 500, color: 'rgba(255,255,255,0.8)' }}>Sign in with</label>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                      <button type="button" onClick={goToRealSignIn} style={tabStyle}>🍎 Continue with Apple</button>
                      <button type="button" onClick={goToRealSignIn} style={tabStyle}>
                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Continue with Google
                      </button>
                    </div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.2)' }} />
                    <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)' }}>or</span>
                    <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.2)' }} />
                  </div>
                  <div>
                    <label style={{ display: 'block', marginBottom: 8, fontSize: 14, fontWeight: 500, color: 'rgba(255,255,255,0.8)' }}>Email</label>
                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" required style={inputStyle} />
                  </div>
                  <div>
                    <label style={{ display: 'block', marginBottom: 8, fontSize: 14, fontWeight: 500, color: 'rgba(255,255,255,0.8)' }}>Password</label>
                    <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder={mode === 'signup' ? 'Create password' : 'Password'} required style={inputStyle} />
                  </div>
                  {mode === 'signup' && (
                    <div>
                      <label style={{ display: 'block', marginBottom: 8, fontSize: 14, fontWeight: 500, color: 'rgba(255,255,255,0.8)' }}>Re-enter password</label>
                      <input type="password" value={cpw} onChange={e => setCpw(e.target.value)} placeholder="Re-enter password" required style={inputStyle} />
                    </div>
                  )}
                  {error && <div style={{ borderRadius: 8, border: '1px solid rgba(239,68,68,0.4)', background: 'rgba(239,68,68,0.1)', padding: '8px 12px', fontSize: 14, color: '#fca5a5' }}>{error}</div>}
                  <button type="submit" disabled={redirecting} style={{ height: 48, width: '100%', borderRadius: 10, background: green, color: '#fff', border: 'none', fontSize: 'clamp(0.95rem, 1vw, 1.06rem)', fontWeight: 600, cursor: redirecting ? 'not-allowed' : 'pointer', opacity: redirecting ? 0.8 : 1 }}>
                    {redirecting ? 'Redirecting to Stratify...' : (mode === 'signup' ? 'Create account' : 'Log in')}
                  </button>
                  <p style={{ textAlign: 'center', fontSize: 14, color: 'rgba(255,255,255,0.6)', margin: 0 }}>
                    {mode === 'signup' ? <>Already have an account? <button type="button" onClick={() => switchMode('login')} style={{ background: 'none', border: 'none', color: '#fff', fontWeight: 500, cursor: 'pointer', textDecoration: 'underline' }}>Sign in</button></> : <>Don't have an account? <button type="button" onClick={() => switchMode('signup')} style={{ background: 'none', border: 'none', color: '#fff', fontWeight: 500, cursor: 'pointer', textDecoration: 'underline' }}>Sign up now</button></>}
                  </p>
                  <p style={{ textAlign: 'center', fontSize: 'clamp(0.72rem, 0.8vw, 0.85rem)', color: 'rgba(255,255,255,0.4)', lineHeight: 1.5, margin: 0 }}>
                    By continuing, you agree to Stratify's{' '}
                    <button type="button" onClick={() => setShowTerms(true)} style={{ color: green, background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline', padding: 0 }}>Terms of Service</button>
                    {' '}and{' '}
                    <button type="button" onClick={() => setShowPrivacy(true)} style={{ color: green, background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline', padding: 0 }}>Privacy Policy</button>.
                  </p>
                </form>
              </div>
            </main>
          </div>
          <Modal title="Terms of Service" isOpen={showTerms} onClose={() => setShowTerms(false)}>
            <p>This is a sandbox preview. Full terms are in the app.</p>
          </Modal>
          <Modal title="Privacy Policy" isOpen={showPrivacy} onClose={() => setShowPrivacy(false)}>
            <p>This is a sandbox preview. Full privacy policy is in the app.</p>
          </Modal>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
