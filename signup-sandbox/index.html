<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stratify Signup – Sandbox</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <style>* { box-sizing: border-box; } body { margin: 0; } input::placeholder { color: rgba(255,255,255,0.2) !important; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState } = React;

    function App() {
      const [email, setEmail] = useState("");
      const [pw, setPw] = useState("");
      const [cpw, setCpw] = useState("");
      const [loading, setLoading] = useState(false);
      const [success, setSuccess] = useState(false);
      const [error, setError] = useState(null);
      const [f1, setF1] = useState(false);
      const [f2, setF2] = useState(false);
      const [f3, setF3] = useState(false);
      const [h1, setH1] = useState(false);
      const [h2, setH2] = useState(false);

      const submit = () => {
        if (!email || !pw) { setError("Please fill in all fields"); return; }
        if (pw !== cpw) { setError("Passwords don't match"); return; }
        setError(null); setLoading(true);
        setTimeout(() => { setLoading(false); setSuccess(true); }, 1500);
      };

      const inputWrap = (focused) => ({
        borderRadius: "8px",
        background: focused ? "#1a1a1e" : "#141416",
        border: `1px solid ${focused ? "rgba(255,255,255,0.14)" : "rgba(255,255,255,0.07)"}`,
        boxShadow: focused ? "inset 0 2px 4px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,255,255,0.04)" : "inset 0 2px 4px rgba(0,0,0,0.3)",
        transition: "all 180ms ease",
      });

      const inputStyle = {
        width: "100%", background: "transparent", border: "none", outline: "none",
        padding: "10px 14px", fontSize: "14px", color: "rgba(255,255,255,0.9)",
        boxSizing: "border-box", fontFamily: "system-ui, sans-serif",
      };

      const labelStyle = {
        display: "block", fontSize: "12px", fontWeight: 500,
        color: "rgba(255,255,255,0.4)", marginBottom: "6px",
      };

      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0a", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "system-ui, sans-serif", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "fixed", inset: 0, backgroundImage: "radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px)", backgroundSize: "28px 28px", maskImage: "radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%)", WebkitMaskImage: "radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%)", pointerEvents: "none" }} />
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 32px", borderBottom: "1px solid rgba(255,255,255,0.05)", background: "rgba(10,10,10,0.9)", backdropFilter: "blur(12px)", zIndex: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <rect x="2" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.9" />
                <rect x="11" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.4" />
                <rect x="2" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.4" />
                <rect x="11" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.15" />
              </svg>
              <span style={{ fontWeight: 300, fontSize: "15px", color: "rgba(255,255,255,0.7)" }}>Stratify</span>
            </div>
            <span style={{ fontSize: "13px", color: "rgba(255,255,255,0.4)", cursor: "pointer" }}>Log in →</span>
          </div>
          <div style={{ position: "relative", zIndex: 1, width: "100%", maxWidth: "380px", padding: "0 20px", boxSizing: "border-box" }}>
            <div style={{ textAlign: "center", marginBottom: "28px" }}>
              <h1 style={{ fontSize: "22px", fontWeight: 600, color: "rgba(255,255,255,0.92)", letterSpacing: "-0.03em", margin: "0 0 8px 0" }}>Create your account</h1>
              <p style={{ fontSize: "14px", color: "rgba(255,255,255,0.3)", margin: 0 }}>AI-powered trading strategies. Free to start.</p>
            </div>
            <div style={{ background: "#111113", border: "1px solid rgba(255,255,255,0.07)", borderRadius: "12px", padding: "24px", boxShadow: "0 24px 64px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4)" }}>
              <div style={{ display: "flex", flexDirection: "column", gap: "8px", marginBottom: "20px" }}>
                <button onMouseEnter={() => setH1(true)} onMouseLeave={() => setH1(false)}
                  style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: "8px", padding: "10px 16px", background: h1 ? "#1e1e22" : "#18181b", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "8px", cursor: "pointer", fontSize: "14px", fontWeight: 500, color: "rgba(255,255,255,0.75)", fontFamily: "inherit", transition: "background 150ms ease" }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                  </svg>
                  Continue with Google
                </button>
                <button onMouseEnter={() => setH2(true)} onMouseLeave={() => setH2(false)}
                  style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: "8px", padding: "10px 16px", background: h2 ? "#1e1e22" : "#18181b", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "8px", cursor: "pointer", fontSize: "14px", fontWeight: 500, color: "rgba(255,255,255,0.75)", fontFamily: "inherit", transition: "background 150ms ease" }}>
                  <svg width="20" height="20" viewBox="0 0 36 36" fill="none">
                    <defs><linearGradient id="mg" x1="4" y1="18" x2="32" y2="18" gradientUnits="userSpaceOnUse"><stop offset="0%" stopColor="#0082FB"/><stop offset="100%" stopColor="#0668E1"/></linearGradient></defs>
                    <path d="M18 13.5C15.6 10.1 13.1 8 10.5 8C6.9 8 4 12.3 4 18C4 21 4.8 23.5 6.1 25.1C7.2 26.4 8.6 27 10.5 27C12.5 27 14.2 26 15.9 24.1C16.6 23.3 17.3 22.3 18 21.1C18.7 22.3 19.4 23.3 20.1 24.1C21.8 26 23.5 27 25.5 27C27.4 27 28.8 26.4 29.9 25.1C31.2 23.5 32 21 32 18C32 12.3 29.1 8 25.5 8C22.9 8 20.4 10.1 18 13.5Z" fill="url(#mg)"/>
                  </svg>
                  Continue with Meta
                </button>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                <div style={{ flex: 1, height: "1px", background: "rgba(255,255,255,0.06)" }} />
                <span style={{ fontSize: "11px", color: "rgba(255,255,255,0.25)" }}>or</span>
                <div style={{ flex: 1, height: "1px", background: "rgba(255,255,255,0.06)" }} />
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: "14px", marginTop: "20px" }}>
                <div><label style={labelStyle}>Email</label><div style={inputWrap(f1)}><input style={inputStyle} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" onFocus={() => setF1(true)} onBlur={() => setF1(false)} /></div></div>
                <div><label style={labelStyle}>Password</label><div style={inputWrap(f2)}><input style={inputStyle} type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="Min. 8 characters" onFocus={() => setF2(true)} onBlur={() => setF2(false)} /></div></div>
                <div><label style={labelStyle}>Confirm password</label><div style={inputWrap(f3)}><input style={inputStyle} type="password" value={cpw} onChange={e => setCpw(e.target.value)} placeholder="Repeat password" onFocus={() => setF3(true)} onBlur={() => setF3(false)} /></div></div>
              </div>
              {error && <p style={{ margin: "12px 0 0", fontSize: "12px", color: "#f87171" }}>{error}</p>}
              {success && <p style={{ margin: "12px 0 0", fontSize: "12px", color: "#34d399" }}>✓ Account created — redirecting...</p>}
              <button onClick={submit} style={{ width: "100%", marginTop: "20px", padding: "11px", background: success ? "rgba(255,255,255,0.08)" : "#fff", border: "none", borderRadius: "8px", cursor: "pointer", fontSize: "14px", fontWeight: 600, color: success ? "rgba(255,255,255,0.3)" : "#0a0a0a", fontFamily: "inherit", letterSpacing: "-0.01em", transition: "opacity 150ms ease" }}>
                {loading ? "Creating account..." : success ? "Done!" : "Create account"}
              </button>
              <p style={{ textAlign: "center", marginTop: "16px", marginBottom: 0, fontSize: "13px", color: "rgba(255,255,255,0.25)" }}>
                Already have an account? <span style={{ color: "rgba(255,255,255,0.55)", cursor: "pointer" }}>Log in</span>
              </p>
            </div>
            <p style={{ textAlign: "center", marginTop: "20px", fontSize: "11px", color: "rgba(255,255,255,0.18)", lineHeight: 1.6 }}>
              By continuing, you agree to Stratify's <span style={{ color: "rgba(255,255,255,0.35)", cursor: "pointer" }}>Terms</span> and <span style={{ color: "rgba(255,255,255,0.35)", cursor: "pointer" }}>Privacy Policy</span>.
            </p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
